function VoiceButton({onResult}){
const [listening,setListening]=useState(false);
const recRef=useRef(null);
const listenRef=useRef(false);
const start=()=>{
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert(“このブラウザは音声入力非対応です（Chrome推奨）”);return;}
const rec=new SR();
rec.lang=“ja-JP”;rec.continuous=true;rec.interimResults=false;
rec.onresult=(e)=>{let t=””;for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)t+=e.results[i][0].transcript;}if(t)onResult(t);};
rec.onend=()=>{if(listenRef.current){try{rec.start();}catch(e){}}};
rec.onerror=(e)=>{if(e.error!==“aborted”){listenRef.current=false;setListening(false);}};
rec.start();recRef.current=rec;listenRef.current=true;setListening(true);
};
const stop=()=>{listenRef.current=false;try{recRef.current?.stop();}catch(e){}setListening(false);};
return (
<button onClick={listening?stop:start} style={{width:44,height:44,borderRadius:“50%”,flexShrink:0,background:listening?C.red:C.card,border:`2px solid ${listening?C.red:C.border}`,fontSize:20,cursor:“pointer”,display:“flex”,alignItems:“center”,justifyContent:“center”,boxShadow:listening?`0 0 0 5px ${C.redBd}`:“0 1px 4px rgba(0,0,0,0.1)”,transition:“all 0.2s”}}>
{listening?“⏹”:“🎤”}
</button>
);
}

function PinScreen({mode,stored,onUnlock,onSet}){
const[pin,setPin]=useState(””);const[conf,setConf]=useState(””);const[step,setStep]=useState(1);const[err,setErr]=useState(””);

const del=()=>{if(mode!==“unlock”&&step===2)setConf(c=>c.slice(0,-1));else setPin(p=>p.slice(0,-1));};

<div style={{minHeight:“100vh”,background:C.pin,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:32}}>

function StatsView({customers}){
const today=new Date();const thisMonthKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
const allVisits=customers.flatMap(c=>(c.visits||[]).filter(v=>!v.cancelled));
const d90=new Date(today);d90.setDate(d90.getDate()-90);const d90str=d90.toISOString().split(“T”)[0];
const active=customers.filter(c=>c.lastVisit>=d90str).length;
const repeaters=customers.filter(c=>(c.visits||[]).filter(v=>!v.cancelled).length>=2).length;
const repeaterRate=customers.length?Math.round(repeaters/customers.length*100):0;
const thisMonthCount=allVisits.filter(v=>v.date.startsWith(thisMonthKey)).length;
const months=[];
for(let i=5;i>=0;i–){const d=new Date(today.getFullYear(),today.getMonth()-i,1);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;const mvs=allVisits.filter(v=>v.date.startsWith(key));months.push({key,label:`${d.getMonth()+1}月`,count:mvs.length,revenue:mvs.reduce((s,v)=>s+(v.price||0),0)});}
const maxCount=Math.max(…months.map(m=>m.count),1);
const freq={one:0,few:0,regular:0};customers.forEach(c=>{const vc=(c.visits||[]).filter(v=>!v.cancelled).length;if(vc===1)freq.one++;else if(vc>=2&&vc<=5)freq.few++;else if(vc>=6)freq.regular++;});
const intervals=[];customers.forEach(c=>{const vs=(c.visits||[]).filter(v=>!v.cancelled).sort((a,b)=>a.date.localeCompare(b.date));for(let i=1;i<vs.length;i++){const diff=(new Date(vs[i].date)-new Date(vs[i-1].date))/(1000*60*60*24);if(diff>0&&diff<365)intervals.push(diff);}});
const avgInterval=intervals.length?Math.round(intervals.reduce((s,v)=>s+v,0)/intervals.length):null;
const totalRevenue=allVisits.reduce((s,v)=>s+(v.price||0),0);
const top3=[…customers].map(c=>({…c,vc:(c.visits||[]).filter(v=>!v.cancelled).length,total:(c.visits||[]).filter(v=>!v.cancelled).reduce((s,v)=>s+(v.price||0),0)})).sort((a,b)=>b.vc-a.vc).slice(0,3);

{months.map(m=>(
<div key={m.key} style={{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,gap:4}}>

{[[“初回のみ（1回）”,freq.one,”#E67E22”,”#FFF3E0”],[“定期（2〜5回）”,freq.few,C.accent,C.accentL],[“常連（6回以上）”,freq.regular,C.green,C.greenBg]].map(([label,count,color,bg])=>(

</div>
<div style={{fontSize:12,fontWeight:700,color:C.sub,marginBottom:8}}>セキュリティ</div>
<div style={{background:C.greenBg,border:`1.5px solid ${C.greenBd}`,borderRadius:16,padding:16,marginBottom:14,fontSize:13,color:”#2E5E3E”,lineHeight:1.7}}>
<div style={{fontWeight:800,fontSize:14,marginBottom:8}}>🔒 データの安全性</div>
✅ データはこの端末内のみに保存<br/>
✅ 外部サーバーへの送信ゼロ<br/>
✅ データは難読化して保存<br/>
✅ PINロックで保護<br/><br/>
⚠️ iPhoneのFace ID・パスコードも必ずONに
</div>
<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:“hidden”}}>
{mi(“🔑”,“PINを変更”,onChangePin)}
<div style={{padding:16,display:“flex”,justifyContent:“space-between”,fontSize:14,color:C.sub}}>
<span>バージョン</span><span>v7.0 完成版</span>
</div>
</div>
</div>
</div>
);
}

function App(){
const[appScreen,setAppScreen]=useState(()=>{
const hasPin=!!loadPin();
const hasData=!!loadData();
if(!hasPin&&!hasData)return”welcome”;
if(!hasPin)return”setup”;
return”lock”;
});
const[unlocked,setUnlocked]=useState(false);
const[customers,setCustomers]=useState(()=>loadData()||SAMPLE);
const[view,setView]=useState(“list”);
const[selId,setSelId]=useState(null);
const[camFile,setCamFile]=useState(null);
const[lastBackup,setLastBackup]=useState(()=>loadLastBackup());

useEffect(()=>{saveData(customers);},[customers]);

const sel=customers.find(c=>c.id===selId);
const upd=(id,fn)=>setCustomers(p=>p.map(c=>c.id===id?fn(c):c));
const handleBackupDone=()=>{saveLastBackup();setLastBackup(loadLastBackup());};

if(appScreen===“welcome”){
return (
<WelcomeScreen
onRestore={(data)=>{setCustomers(data);saveData(data);setAppScreen(“setup”);}}
onFresh={()=>setAppScreen(“setup”)}
/>
);
}
if(!unlocked){
if(appScreen===“setup”)return <PinScreen mode=“setup” onSet={p=>{savePin(p);setUnlocked(true);}}/>;
return <PinScreen mode=“unlock” stored={loadPin()} onUnlock={()=>setUnlocked(true)}/>;
}

const addCust=(f)=>{setCustomers(p=>[…p,{id:Date.now(),…f,lastVisit:f.firstVisit,cartePhotos:f.cartePhotos||[],visits:[]}]);setView(“list”);};
const editCust=(f)=>{upd(selId,c=>({…c,…f}));setView(“detail”);};
const addVisit=(f)=>{const v={id:Date.now(),date:f.date,menu:f.menu,chemicals:f.chemicals,price:Number(f.price)||0,memo:f.memo,cancelled:f.cancelled||false};upd(selId,c=>({…c,visits:[…(c.visits||[]),v],lastVisit:!f.cancelled&&f.date>(c.lastVisit||””)?f.date:c.lastVisit}));setView(“detail”);};
const delCust=()=>{if(!confirm(`${sel?.name} を削除しますか？`))return;setCustomers(p=>p.filter(c=>c.id!==selId));setView(“list”);};
const togReview=(cid,rid)=>upd(cid,c=>({…c,reviews:(c.reviews||[]).map(r=>r.id===rid?{…r,done:!r.done}:r)}));
const togReferral=(cid,rid)=>upd(cid,c=>({…c,referrals:(c.referrals||[]).map(r=>r.id===rid?{…r,done:!r.done}:r)}));
const togEvent=(cid,eid)=>upd(cid,c=>({…c,events:(c.events||[]).map(e=>e.id===eid?{…e,done:!e.done}:e)}));
const onImported=(nc)=>{setCustomers(p=>[…p,nc]);setSelId(nc.id);setView(“detail”);};

const showNav=[“list”,“detail”,“stats”,“settings”].includes(view);
const navItems=[[“👥”,“顧客”,“list”],[“🤖”,“AI読取”,“ai”],[“📊”,“統計”,“stats”],[“⚙️”,“設定”,“settings”]];

return (
<div style={S.app}>
{view===“list”&&<ListView customers={customers} onSelect={id=>{setSelId(id);setView(“detail”);}} onAdd={()=>setView(“add”)} onCamera={f=>{setCamFile(f);setView(“ai”);}} lastBackup={lastBackup} onGoSettings={()=>setView(“settings”)}/>}
{view===“detail”&&sel&&<DetailView c={sel} onBack={()=>setView(“list”)} onEdit={()=>setView(“edit”)} onAddVisit={()=>setView(“visit”)} onDelete={delCust} onReview={rid=>togReview(selId,rid)} onReferral={rid=>togReferral(selId,rid)} onEvent={eid=>togEvent(selId,eid)}/>}
{view===“add”&&<CustForm title=“新規顧客登録” onSave={addCust} onCancel={()=>setView(“list”)}/>}
{view===“edit”&&sel&&<CustForm title=“顧客情報編集” init={sel} onSave={editCust} onCancel={()=>setView(“detail”)}/>}
{view===“visit”&&sel&&<VisitForm customer={sel} onSave={addVisit} onCancel={()=>setView(“detail”)}/>}
{view===“ai”&&<AiView initFile={camFile} onDone={onImported} onCancel={()=>{setCamFile(null);setView(“list”);}}/>}
{view===“stats”&&<StatsView customers={customers}/>}
{view===“settings”&&<SettingsView onBack={()=>setView(“list”)} customers={customers} onImport={d=>{setCustomers(d);setView(“list”);}} onChangePin={()=>{localStorage.removeItem(PKEY);setAppScreen(“setup”);setUnlocked(false);}} lastBackup={lastBackup} onBackupDone={handleBackupDone}/>}
{showNav&&(
<div style={{position:“fixed”,bottom:0,left:“50%”,transform:“translateX(-50%)”,width:“100%”,maxWidth:430,background:C.card,borderTop:`1px solid ${C.border}`,display:“flex”,height:72,zIndex:10}}>
{navItems.map(([icon,label,v])=>(
<div key={v} onClick={()=>{if(v===“ai”)setCamFile(null);setView(v);}} style={{flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,gap:2,cursor:“pointer”,fontSize:10,fontWeight:600,color:view===v?C.text:C.sub}}>
<span style={{fontSize:22}}>{icon}</span>{label}
</div>
))}
</div>
)}
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById(“root”));
root.render(<App />);

if (‘serviceWorker’ in navigator) {
window.addEventListener(‘load’, () => {
navigator.serviceWorker.register(’./sw.js’).catch(console.error);
});
}
</script>

</body>
</html>
